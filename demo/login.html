<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Inventory - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .input-group {
            position: relative;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.8);
            color: #667eea;
        }
        .input-group label {
            position: absolute;
            left: 0.75rem;
            top: 0.75rem;
            transition: all 0.2s ease;
            pointer-events: none;
            color: #6b7280;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .alert {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="login-container flex items-center justify-center p-4">
    <div class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full mb-4">
                <i class="fas fa-utensils text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">Restaurant Inventory</h1>
            <p class="text-gray-600">Sign in to manage your inventory</p>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer" class="mb-6"></div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <!-- Login Type Toggle -->
            <div class="flex bg-gray-100 rounded-lg p-1">
                <button type="button" id="regularLoginTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors bg-white text-blue-600 shadow-sm">
                    Regular User
                </button>
                <button type="button" id="adminLoginTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors text-gray-600 hover:text-gray-800">
                    Admin
                </button>
            </div>

            <!-- Regular User Login Fields -->
            <div id="regularLoginFields">
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <label for="email">Email Address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder=" " class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <label for="password">Password</label>
                </div>
            </div>

            <!-- Admin Login Fields -->
            <div id="adminLoginFields" class="hidden">
                <div class="input-group">
                    <input type="text" id="username" placeholder=" " class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <label for="username">Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="adminPassword" placeholder=" " class="w-full px-3 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    <label for="adminPassword">Password</label>
                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" id="loginButton" class="w-full btn-primary text-white py-3 px-4 rounded-lg font-medium">
                <span id="loginButtonText">Sign In</span>
                <i id="loginSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>

            <!-- Demo Credentials -->
            <div class="text-center">
                <p class="text-sm text-gray-600 mb-2">Demo Credentials:</p>
                <div class="text-xs text-gray-500 space-y-1">
                    <div>Admin: username = <strong>admin</strong>, password = <strong>admin</strong></div>
                </div>
            </div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
